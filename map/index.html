<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta
            content="initial-scale=1, maximum-scale=1, user-scalable=no"
            name="viewport"
    />

    <title>Drone Map of California</title>

    <!--Arcgis Stylesheet-->
    <link
            href="https://js.arcgis.com/4.27/esri/themes/light/main.css"
            rel="stylesheet"
    />

    <!--Custom Stylesheet-->
    <link href="css/style.css" rel="stylesheet" />
    <script src="https://js.arcgis.com/4.27/"></script>

    <!-- Map Javascript Content -->
    <script src="scripts/symbols.js" type="text/javascript"></script>
    <script src="scripts/labels.js" type="text/javascript"></script>
    <script src="scripts/renderers.js" type="text/javascript"></script>
    <script src="scripts/render_UC.js" type="text/javascript"></script>
    <script src="scripts/arcade.js" type="text/javascript"></script>
    <script src="scripts/map.js" type="text/javascript"></script>

    <!-- Logic Javascript Content -->
    <script src="scripts/logic.js" type="text/javascript"></script>
</head>

<body>
<a class="skip-link" href="#main">Skip to main content</a>
<div class="wrapper" id="content">
    <header class="top_header">
        <h1>Drone Map of California</h1>
    </header>

    <main id="main" tabindex="-1">
        <aside class="dash_window" id="DashBoard">
            <div class="panel">
                <div class="panel-header">Address Search</div>
                <div id="address-search"
                     aria-label="Find an address or location"
                ></div>

            </div>
            <div class="panel">
                <div class="panel-header">Layers</div>
                <div id="layers"
                     aria-label="Find an address or location"
                ></div>

            </div>

            <div class="panel">
                <div class="panel-header">Lat and Lon</div>

                <div class="coords">
                    <label for="flat">Lat:</label>
                    <input id="flat" name="flat" type="text" inputmode="decimal">
                    <button type="button" onclick="copyTextBoxLat()">Copy</button>

                    <label for="flon">Lon:</label>
                    <input id="flon" name="flon" type="text" inputmode="decimal">
                    <button type="button" onclick="copyTextBoxLon()">Copy</button>
                </div>
            </div>


            <br />
            <div class="small-caption">Missing information? Email us at <a href="mailto:UASsafety@ucmerced.edu">UASsafety@ucmerced.edu</a></div>
        </aside>
        <div class="map_window" id="Map"></div>


    </main>
</div>
</body>
</html>
