<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Certificate Generator</title>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    /* Base typography & layout */
    body {
      font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #333333;
      background-color: #ffffff;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    /* Form elements */
    label {
      display: block;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      line-height: 1.4;
      color: #333333;
      background-color: #f9f9f9;
      border: 1px solid #cccccc;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      box-sizing: border-box;
    }

    /* Rise-style button */
    button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      background-color: #285F9F;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #537FB2;
    }
    button:disabled {
      background-color: #9bb3cf;
      cursor: not-allowed;
    }

    /* Output text */
    #output {
      margin-top: 2rem;
      font-size: 1rem;
      color: #555555;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .small-note {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: #666666;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Print Your Certificate</h1>

    <label for="nameInput">Type your name to sign:</label>
    <input type="text" id="nameInput" placeholder="Name" />

    <label for="emailInput">Enter your email address</label>
    <input type="text" id="emailInput" placeholder="email@campus.edu" />

    <div class="cf-turnstile" data-sitekey="0x4AAAAAAChonen4c54lVaI4"></div>
    <button id="printBtn">Print</button>

    <div id="output">Download and save the file for your records.</div>
  </div>

  <script>
    // -----------------------------
    // Config
    // -----------------------------
    const CERT_TYPE = "Part 91/107 Training";

    // Set this to your deployed Vercel domain (no trailing slash).
    // Example: "https://airtable-api-waiver2.vercel.app"
    const VERCEL_PROD_ORIGIN = "https://airtable-api-waiver2.vercel.app";

    const TEMPLATE_URL = "https://ucdrones.github.io/library/cert_templates/leBVLOS_91d107_cert.pdf";

    // -----------------------------
    // DOM helpers
    // -----------------------------
    const nameInput = document.getElementById("nameInput");
    const emailInput = document.getElementById("emailInput");
    const btn = document.getElementById("printBtn");
    const output = document.getElementById("output");

    function setStatus(msg) {
      output.textContent = msg;
    }

    function makeFilename(certType, date) {
      const safeType = certType
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return `certificate-${safeType}-${date}.pdf`;
    }

    // If running locally (for development), this will use your local vercel dev server.
    // Otherwise it uses your deployed Vercel project.
    function getApiOrigin() {
      if (window.location.protocol === "file:") {
        throw new Error("This page is opened as file://. Serve it via http:// (Live Server or python -m http.server).");
      }
      const host = window.location.hostname;
      const isLocal = host === "localhost" || host === "127.0.0.1";
      return isLocal ? "http://localhost:3000" : VERCEL_PROD_ORIGIN;
    }

    function isLikelyEmail(s) {
      // Basic check only. Server is the source of truth.
      return typeof s === "string" && s.includes("@") && s.includes(".");
    }

    function getTurnstileToken() {
      return document.querySelector('input[name="cf-turnstile-response"]')?.value || "";
    }

    // -----------------------------
    // API call
    // -----------------------------
    async function callLogApi({ name, email, trainingType, turnstileToken }) {
      const apiOrigin = getApiOrigin();
      const url = apiOrigin + "/api/waiver-log";

      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, trainingType, turnstileToken })
      });

      let data = null;
      try {
        data = await resp.json();
      } catch {
        data = { ok: false, error: "Server returned a non-JSON response." };
      }

      return { resp, data };
    }

    // -----------------------------
    // PDF generation
    // -----------------------------
    async function generateCertificatePdf(name, cert, date) {
      // Load your PDF template (hosted alongside this page or at a stable URL)
      const existingPdfBytes = await fetch(TEMPLATE_URL).then((r) => r.arrayBuffer());
      const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);

      const font = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

      const page = pdfDoc.getPage(0);
      const maxWidth = 600;
      const defaultSize = 36;

      const textWidth = font.widthOfTextAtSize(name, defaultSize);
      let size = defaultSize;
      if (textWidth > maxWidth) {
        size = (maxWidth / textWidth) * defaultSize;
        size = Math.max(size, 18);
      }

      const pageWidth = page.getSize().width;
      const actualTextWidth = font.widthOfTextAtSize(name, size);
      const x = (pageWidth - actualTextWidth) / 2;

      // These coordinates match your earlier template placement.
      page.drawText(name, { x: x, y: 320, size: size, font: font });
      page.drawText(date, { x: 500, y: 120, size: 25, font: font });
      page.drawText(cert, { x: x, y: 300, size: 15, font: font });

      return await pdfDoc.save();
    }

    function downloadPdf(pdfBytes, filename) {
      const blob = new Blob([pdfBytes], { type: "application/pdf" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    }

    // -----------------------------
    // Main button handler
    // -----------------------------
    async function onPrintClicked() {
      btn.disabled = true;

      const name = (nameInput.value || "").trim();
      const email = (emailInput.value || "").trim();
      const turnstileToken = getTurnstileToken();

      if (!name) {
        setStatus("Please enter your name.");
        btn.disabled = false;
        return;
      }
      if (!email || !isLikelyEmail(email)) {
        setStatus("Please enter a valid email address.");
        btn.disabled = false;
        return;
      }
      if (!turnstileToken) {
        setStatus("Please complete the captcha, then try again.");
        btn.disabled = false;
        return;
      }
      setStatus("Verifying your email and logging your certificate...");

      let apiResult;
      try {
        apiResult = await callLogApi({
          name,
          email,
          trainingType: CERT_TYPE,
          turnstileToken
        });
      } catch {
        setStatus("Could not reach the certificate server. Please try again later.");
        btn.disabled = false;
        return;
      }

      const { resp, data } = apiResult;
      const url = apiResult.url;

      if (!resp.ok || !data || data.ok !== true) {
        const msg = (data && data.error) ? data.error : "Could not verify your email address.";
        setStatus(msg);
        btn.disabled = false;
        return;
      }

      // Use server-generated values so PDF matches the logged record
      const cert = data.cert || "COEUNKNOWN";
      const date = data.date || "";

      setStatus("Generating your PDF certificate...");

      try {
        const pdfBytes = await generateCertificatePdf(name, cert, date);
        const filename = makeFilename(CERT_TYPE, date);
        downloadPdf(pdfBytes, filename);

        setStatus("Success. Download and save the file for your records.");
      } catch (e) {
        setStatus("Your certificate was logged, but PDF generation failed. Please try again.");
      }

      btn.disabled = false;
    }

    btn.addEventListener("click", onPrintClicked);
  </script>
</body>
</html>
